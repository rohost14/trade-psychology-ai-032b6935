name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tradementor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tradementor_test
      SECRET_KEY: ci-secret-key-not-for-production
      ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
      ALGORITHM: HS256
      ENVIRONMENT: development
      # Redis not required for unit tests (mocked where needed)
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations on test DB
        run: |
          cd backend
          # Apply all migrations in order
          for f in migrations/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=postgres psql -h localhost -U postgres -d tradementor_test -f "$f" || true
          done

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -q --tb=short

  frontend-build:
    name: Frontend Build (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check + build
        run: npm run build
