version: "3.9"

# ── Local development docker-compose ──────────────────────────────────────────
# Usage:
#   cp backend/.env.example backend/.env   # fill in your values
#   docker compose up --build
#
# Access:
#   API:      http://localhost:8000
#   Frontend: run `npm run dev` separately (Vite HMR doesn't work inside Docker)

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradementor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tradementor
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app worker
      --pool=gevent --concurrency=100
      --queues=trades,alerts,reports
      --loglevel=INFO
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tradementor
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app beat
      --scheduler=redbeat.RedBeatScheduler
      --loglevel=INFO
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tradementor
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
